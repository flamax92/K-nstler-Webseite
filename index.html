<style>

*{
box-sizing:border-box;
}


html{
scroll-behavior:smooth;
}


body{

margin:0;

font-family:
Helvetica,
Arial,
sans-serif;

color:white;

background:black;

overflow-x:hidden;

}


/* Hintergrund */

.background-image{

position:fixed;

inset:0;

z-index:-2;

background-image:url(
"https://images.unsplash.com/photo-1549490349-8643362247b5"
);

background-size:cover;

background-position:center;

}


.background-image::after{

content:"";

position:absolute;

inset:0;

background:rgba(0,0,0,0.45);

}



/* Künstlername */

.artist-name{

position:fixed;

top:30px;

left:40px;

font-size:32px;

font-weight:400;

z-index:20;

}



/* Navigation */

.navigation{

position:fixed;

top:35px;

right:40px;

z-index:20;

}


.navigation a{

color:white;

text-decoration:none;

margin-left:25px;

font-size:16px;

}



/* Startseite */


.page{

min-height:100vh;

}



#home{

display:flex;

flex-direction:column;

justify-content:center;

overflow:hidden;

}



.project{

display:block;

width:max-content;

white-space:nowrap;

font-size:
clamp(45px,8vw,120px);

font-weight:300;

color:white;

text-decoration:none;

margin:15px 0;

animation:
move 35s linear infinite;

}


.project:nth-child(even){

animation-direction:reverse;

}


.project:nth-child(3n){

animation-duration:45s;

}



@keyframes move{

from{

transform:translateX(-120%);

}


to{

transform:translateX(120vw);

}

}



/* Projektseiten */


.gallery-page{

background:white;

color:black;

padding-top:120px;

min-height:100vh;

display:none;

}


.gallery-title{

font-size:60px;

font-weight:300;

margin-left:40px;

}



.gallery{

display:grid;

grid-template-columns:
repeat(auto-fit,minmax(300px,1fr));

gap:40px;

padding:40px;

}



.gallery img{

width:100%;

display:block;

}



/* CV */


.cv-page{

background:white;

color:black;

padding:150px 40px;

display:none;

min-height:100vh;

}



.cv-page h2{

font-size:60px;

font-weight:300;

}



/* zurück */


.back{

color:black;

text-decoration:none;

font-size:18px;

}



/* Mobile */


@media(max-width:700px){


.artist-name{

left:20px;

top:20px;

font-size:24px;

}


.navigation{

right:20px;

top:25px;

}


.project{

font-size:45px;

}


.gallery-title{

font-size:40px;

margin-left:20px;

}


}

</style>
